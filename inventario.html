<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventario - Burguer House</title>

<link rel="icon" href="logo.jpeg">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Segoe UI',sans-serif;

}




body{

background:#2b0b73;

min-height:100vh;

padding:20px;

}





.container{


max-width:1100px;

margin:auto;

background:#f6f4ff;

padding:25px;

border-radius:25px;


}





.header{


display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

margin-bottom:25px;


}





.header h1{


font-size:32px;

color:#5d12d9;


}




.header p{


color:#777;


}





.back{


background:#5d12d9;

color:white;

padding:12px 18px;

border-radius:14px;

text-decoration:none;


}





.cards{


display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;


}





.card{


background:white;

padding:20px;

border-radius:22px;

box-shadow:0 5px 15px #0001;


}





.card h2{


color:#6517d8;

margin-bottom:15px;


}





input,
select{


width:100%;

padding:13px;

margin-bottom:10px;

border:none;

background:#f3f3f8;

border-radius:12px;

outline:none;


}





button{


border:none;

padding:12px 15px;

border-radius:12px;

cursor:pointer;

font-weight:bold;


}




.save{


background:linear-gradient(90deg,#8e3eff,#7000ff);

color:white;

width:100%;


}





.table{


margin-top:25px;

overflow:auto;


}




table{


width:100%;

border-collapse:collapse;

background:white;


}





th{


background:#eee5ff;

color:#6517d8;

padding:12px;


}





td{


padding:12px;

border-bottom:1px solid #eee;


}





.estado{


padding:6px 10px;

border-radius:20px;

font-size:12px;


}




.disponible{


background:#d9ffe5;

color:#0b8f3d;


}




.bajo{


background:#fff1c7;

color:#b36b00;


}





.agotado{


background:#ffdada;

color:red;


}





.edit{


background:#e5ddff;

color:#5d12d9;

margin-right:5px;


}




.delete{


background:#ffe1e1;

color:red;


}





.total{


margin-top:20px;

background:#5d12d9;

color:white;

padding:20px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;


}




@media(max-width:600px){


.header h1{


font-size:25px;


}


}


</style>


</head>





<body>





<div class="container">





<div class="header">



<div>


<h1>

<i class="fa-solid fa-boxes-stacked"></i>

Inventario

</h1>



<p>

Control de ingredientes y compras

</p>



</div>





<a href="index.html" class="back">


<i class="fa-solid fa-house"></i>

Inicio


</a>





</div>









<div class="cards">





<div class="card">



<h2>

<i class="fa-solid fa-carrot"></i>

Agregar ingrediente

</h2>






<input 
id="nombre"
placeholder="Nombre ingrediente">






<input 
id="cantidad"
type="number"
placeholder="Cantidad disponible">






<select id="unidad">


<option value="Unidad">

Unidad

</option>


<option value="Libra">

Libra

</option>


<option value="Litro">

Litro

</option>


<option value="Paquete">

Paquete

</option>


</select>






<input 
id="precio"
type="number"
placeholder="Precio compra">






<button 
class="save"
onclick="guardarIngrediente()">



<i class="fa-solid fa-save"></i>


Guardar ingrediente


</button>




</div>









<div class="card">



<h2>


<i class="fa-solid fa-cart-shopping"></i>


Registrar compra


</h2>







<select id="productoCompra">

</select>







<input
id="cantidadCompra"
type="number"
placeholder="Cantidad comprada">






<input
id="precioCompra"
type="number"
placeholder="Precio pagado">







<button
class="save"
onclick="comprar()">



<i class="fa-solid fa-plus"></i>


Agregar compra


</button>






</div>






</div>









<div class="table">





<table>


<thead>


<tr>


<th>

Ingrediente

</th>


<th>

Cantidad

</th>


<th>

Unidad

</th>


<th>

Precio

</th>


<th>

Estado

</th>


<th>

Acción

</th>



</tr>


</thead>





<tbody id="tabla">


</tbody>





</table>




</div>









<div class="total">



<h3>

Total productos

</h3>



<h2 id="total">

0

</h2>



</div>






</div>



<script>

let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

let compras = JSON.parse(localStorage.getItem("compras")) || [];





function guardar(){

localStorage.setItem(
"inventario",
JSON.stringify(inventario)
);


localStorage.setItem(
"compras",
JSON.stringify(compras)
);


}







function alerta(icon,title,text){


Swal.fire({

icon:icon,

title:title,

text:text,

background:"#1f1f2e",

color:"#fff",

confirmButtonColor:"#7000ff"

});


}








function limpiar(){


document.getElementById("nombre").value="";

document.getElementById("cantidad").value="";

document.getElementById("unidad").value="Unidad";

document.getElementById("precio").value="";


}










function guardarIngrediente(){



let nombre =
document.getElementById("nombre").value.trim();



let cantidad =
Number(document.getElementById("cantidad").value);



let unidad =
document.getElementById("unidad").value;



let precio =
Number(document.getElementById("precio").value);







if(nombre=="" || cantidad<=0 || precio<=0){


alerta(

"error",

"Datos incompletos",

"Completa todos los campos"

);


return;


}







let existe = inventario.find(

p=>p.nombre.toLowerCase()==nombre.toLowerCase()

);








if(existe){



existe.cantidad += cantidad;

existe.precio = precio;



alerta(

"info",

"Ingrediente actualizado",

"Se agregó cantidad al producto existente"

);



}else{



inventario.push({

id:Date.now(),

nombre:nombre,

cantidad:cantidad,

unidad:unidad,

precio:precio


});




alerta(

"success",

"Guardado",

"Ingrediente agregado correctamente"

);



}







guardar();

mostrar();

cargarProductos();

limpiar();



}












function comprar(){



let id = Number(
document.getElementById("productoCompra").value
);



let cantidad = Number(
document.getElementById("cantidadCompra").value
);



let precio = Number(
document.getElementById("precioCompra").value
);







let producto = inventario.find(

p=>p.id===id

);








if(!producto || cantidad<=0){



alerta(

"error",

"Error",

"Selecciona un ingrediente y cantidad"

);


return;


}







producto.cantidad += cantidad;





if(precio>0){

producto.precio=precio;

}








compras.push({


fecha:new Date().toLocaleString(),

producto:producto.nombre,

cantidad:cantidad,

precio:precio


});








guardar();

mostrar();







document.getElementById("cantidadCompra").value="";

document.getElementById("precioCompra").value="";





alerta(

"success",

"Compra registrada",

"Cantidad actualizada"

);



}













function editarCantidad(i){



let producto=inventario[i];





Swal.fire({


title:"Modificar cantidad",


html:

`
<b>${producto.nombre}</b>
<br>
Cantidad actual:
${producto.cantidad}
${producto.unidad}
`,


input:"number",


inputValue:producto.cantidad,


showCancelButton:true,


confirmButtonText:"Guardar",


cancelButtonText:"Cancelar",


confirmButtonColor:"#7000ff",


background:"#1f1f2e",


color:"#fff",




inputValidator:(valor)=>{


if(valor==="" || valor<0){

return "Cantidad incorrecta";

}


}




}).then(resultado=>{



if(resultado.isConfirmed){



producto.cantidad =
Number(resultado.value);





guardar();


mostrar();





alerta(

"success",

"Actualizado",

"Cantidad modificada"

);



}



});



}












function estado(cantidad){



if(cantidad<=0){


return`

<span class="estado agotado">

Agotado

</span>

`;



}





if(cantidad<=5){


return`

<span class="estado bajo">

Bajo

</span>

`;



}





return`

<span class="estado disponible">

Disponible

</span>

`;



}













function mostrar(){



let tabla=document.getElementById("tabla");



tabla.innerHTML="";







inventario.forEach((p,i)=>{





tabla.innerHTML+=`

<tr>


<td>

${p.nombre}

</td>



<td>

${p.cantidad}

</td>



<td>

${p.unidad}

</td>



<td>

C$ ${(p.precio || 0).toFixed(2)}

</td>



<td>

${estado(p.cantidad)}

</td>



<td>


<button 
class="edit"
onclick="editarCantidad(${i})">

<i class="fa-solid fa-box"></i>

</button>



<button
class="delete"
onclick="eliminar(${i})">

<i class="fa-solid fa-trash"></i>

</button>



</td>


</tr>

`;





});






document.getElementById("total").innerHTML=

inventario.length;



}












function cargarProductos(){



let select=document.getElementById("productoCompra");



select.innerHTML="";







if(inventario.length===0){


select.innerHTML=`

<option>

No hay ingredientes

</option>

`;

return;

}







inventario.forEach(p=>{


select.innerHTML+=`

<option value="${p.id}">

${p.nombre}

</option>

`;



});



}













function eliminar(i){



Swal.fire({



title:"¿Eliminar ingrediente?",



text:"Se eliminará del inventario",



icon:"warning",



showCancelButton:true,



confirmButtonText:"Eliminar",



cancelButtonText:"Cancelar",



confirmButtonColor:"#e74c3c",



background:"#1f1f2e",



color:"#fff"



}).then(r=>{



if(r.isConfirmed){



inventario.splice(i,1);



guardar();


mostrar();


cargarProductos();




alerta(

"success",

"Eliminado",

"Ingrediente eliminado"

);



}



});



}









mostrar();

cargarProductos();


</script>

</body>

</html>
