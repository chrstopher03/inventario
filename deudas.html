<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Deudas</title>

<link rel="icon" href="logo.jpeg">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}


body{

background:#2b0b73;

min-height:100vh;

padding:20px;

}



.container{


max-width:1200px;

margin:auto;

background:#f6f4ff;

padding:25px;

border-radius:25px;


}




.header{


display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:15px;


}


.header h1{

color:#5d12d9;

font-size:32px;

}



.header p{

color:#777;

}




.back{


background:white;

color:#5d12d9;

padding:12px 18px;

border-radius:15px;

text-decoration:none;

font-weight:bold;

}





.form{


margin-top:25px;

background:white;

padding:20px;

border-radius:20px;

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(200px,1fr));

gap:15px;


}





input{


padding:14px;

border-radius:12px;

border:1px solid #ddd;

outline:none;


}



input:focus{

border-color:#7000ff;

}





button{


border:none;

cursor:pointer;

border-radius:12px;

padding:13px;

font-weight:bold;


}




.guardar{


background:linear-gradient(
90deg,
#8e3eff,
#7000ff
);

color:white;


}




.alerta{


display:none;

margin-top:20px;

background:#fff3cd;

color:#856404;

padding:18px;

border-radius:15px;

}





.resumen{


margin-top:25px;

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(200px,1fr));

gap:15px;


}



.card{


background:white;

padding:20px;

border-radius:20px;


}



.card h3{

color:#6517d8;

}



.card h1{

margin-top:10px;

color:#5d12d9;

}





.tabla{


margin-top:25px;

overflow-x:auto;

}





table{


width:100%;

background:white;

border-collapse:collapse;

min-width:900px;


}



th{


background:#5d12d9;

color:white;

padding:14px;

}



td{


padding:12px;

text-align:center;

border-bottom:1px solid #eee;


}



.estado{


padding:7px 12px;

border-radius:20px;

font-size:12px;

font-weight:bold;


}



.pendiente{

background:#fff3cd;

color:#856404;

}



.pagada{

background:#d4edda;

color:#155724;

}



.vencida{

background:#f8d7da;

color:#721c24;

}



.abonar{


background:#00a86b;

color:white;

}



.eliminar{


background:#e74c3c;

color:white;

}



</style>

</head>


<body>



<div class="container">



<div class="header">


<div>

<h1>

<i class="fa-solid fa-hand-holding-dollar"></i>

Deudas

</h1>


<p>

Control de dinero pendiente por pagar

</p>

</div>




<a href="index.html" class="back">

<i class="fa fa-arrow-left"></i>

Volver

</a>



</div>








<div id="alerta" class="alerta"></div>






<div class="form">


<input id="persona"
placeholder="Nombre de la persona">



<input id="concepto"
placeholder="Qué debemos">



<input id="monto"
type="number"
placeholder="Monto total C$">



<input id="abono"
type="number"
placeholder="Abono inicial C$">



<input id="fecha"
type="date">





<button class="guardar"
onclick="guardarDeuda()">


<i class="fa fa-save"></i>

Guardar deuda


</button>



</div>








<div class="resumen">



<div class="card">

<h3>
Total Deudas
</h3>

<h1 id="total">

C$0

</h1>


</div>



<div class="card">

<h3>
Total Abonado
</h3>


<h1 id="abonado">

C$0

</h1>


</div>



<div class="card">

<h3>
Falta pagar
</h3>


<h1 id="falta">

C$0

</h1>


</div>



</div>







<div class="tabla">


<table>


<thead>


<tr>

<th>
Persona
</th>


<th>
Concepto
</th>


<th>
Total
</th>


<th>
Pagado
</th>


<th>
Falta
</th>


<th>
Fecha límite
</th>


<th>
Estado
</th>


<th>
Acción
</th>


</tr>


</thead>



<tbody id="tabla">

</tbody>



</table>


</div>



</div>




<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>


let deudas = JSON.parse(
localStorage.getItem("deudas")
)||[];





function guardar(){

localStorage.setItem(
"deudas",
JSON.stringify(deudas)
);

}





function limpiarFormulario(){

document.getElementById("persona").value="";
document.getElementById("concepto").value="";
document.getElementById("monto").value="";
document.getElementById("abono").value="";
document.getElementById("fecha").value="";

}







function alertaError(texto){

Swal.fire({

icon:"error",

title:"Datos incompletos",

text:texto,

background:"#1f1f2e",

color:"#fff",

confirmButtonColor:"#e74c3c"

});

}




function alertaExito(texto){

Swal.fire({

icon:"success",

title:"Guardado correctamente",

text:texto,

background:"#1f1f2e",

color:"#fff",

timer:1800,

showConfirmButton:false

});

}




function alertaInfo(texto){

Swal.fire({

icon:"info",

title:"Información",

text:texto,

background:"#1f1f2e",

color:"#fff",

confirmButtonColor:"#7000ff"

});

}









function guardarDeuda(){



let persona =
document.getElementById("persona").value.trim();



let concepto =
document.getElementById("concepto").value.trim();



let monto =
Number(document.getElementById("monto").value);



let abono =
Number(document.getElementById("abono").value)||0;



let fecha =
document.getElementById("fecha").value;






if(!persona || !concepto || monto<=0 || !fecha){


alertaError(
"Completa todos los campos de la deuda."
);


return;


}






if(abono > monto){


alertaError(
"El abono no puede superar el monto total."
);


return;


}





deudas.push({


id:Date.now(),

persona,

concepto,

monto,

pagado:abono,

fecha


});





guardar();


mostrar();


limpiarFormulario();



alertaExito(
"La deuda fue registrada correctamente."
);



}









function dias(fecha){


let hoy=new Date();


let limite=new Date(fecha);



return Math.ceil(

(limite-hoy)/(1000*60*60*24)

);


}









function mostrar(){



let tabla=document.getElementById("tabla");


if(!tabla)return;



tabla.innerHTML="";



let total=0;

let pagado=0;

let pendiente=0;


let aviso="";





deudas.forEach((d,i)=>{


let falta=d.monto-d.pagado;



total+=d.monto;

pagado+=d.pagado;

pendiente+=falta;





let diasF=dias(d.fecha);





let estado="Pendiente";

let clase="pendiente";





if(falta<=0){

estado="Pagada";

clase="pagada";


}



else if(diasF<0){

estado="Vencida";

clase="vencida";


}





if(diasF<=3 && diasF>=0 && falta>0){


aviso+=`

⚠️ <b>${d.persona}</b><br>

Falta pagar:
C$${falta.toFixed(2)}

<br>

Quedan:
${diasF} días

<br><br>

`;



}








tabla.innerHTML+=`

<tr>


<td>${d.persona}</td>


<td>${d.concepto}</td>


<td>C$${d.monto.toFixed(2)}</td>


<td>C$${d.pagado.toFixed(2)}</td>


<td>C$${falta.toFixed(2)}</td>


<td>

${d.fecha}

<br>

${diasF>=0 ? diasF+" días":"Vencida"}

</td>


<td>


<span class="estado ${clase}">

${estado}

</span>


</td>


<td>



<button 

class="abonar"

onclick="abonar(${i})">

<i class="fa-solid fa-plus"></i>

</button>




<button

class="eliminar"

onclick="eliminar(${i})">

<i class="fa-solid fa-trash"></i>

</button>



</td>


</tr>

`;



});






document.getElementById("total").innerHTML=

"C$"+total.toFixed(2);





document.getElementById("abonado").innerHTML=

"C$"+pagado.toFixed(2);





document.getElementById("falta").innerHTML=

"C$"+pendiente.toFixed(2);






let alerta=document.getElementById("alerta");



if(alerta){


if(aviso){


alerta.style.display="block";

alerta.innerHTML=aviso;


}else{


alerta.style.display="none";


}



}



}









async function abonar(i){



const {value:cantidad}=await Swal.fire({


title:"Agregar abono",


input:"number",


inputPlaceholder:"Ingrese cantidad",


showCancelButton:true,


confirmButtonText:"Guardar",


cancelButtonText:"Cancelar",


background:"#1f1f2e",

color:"#fff",

confirmButtonColor:"#7000ff"


});





if(!cantidad)return;



deudas[i].pagado += Number(cantidad);





if(deudas[i].pagado > deudas[i].monto){

deudas[i].pagado=dedeudas[i].monto;

}





guardar();


mostrar();



alertaExito(
"Abono agregado correctamente."
);



}









async function eliminar(i){



const respuesta=await Swal.fire({


title:"¿Eliminar deuda?",


text:"Esta acción no se puede deshacer.",


icon:"warning",


showCancelButton:true,


confirmButtonText:"Sí, eliminar",


cancelButtonText:"Cancelar",


background:"#1f1f2e",

color:"#fff",


confirmButtonColor:"#e74c3c"


});






if(!respuesta.isConfirmed)return;





deudas.splice(i,1);



guardar();


mostrar();



alertaExito(
"La deuda fue eliminada."
);



}







mostrar();



</script>
</script>

</body>

</html>
